<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Bus (REST)</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: #111; color: #fff; }
        #status { margin: 20px; padding: 15px; background: #222; border-radius: 8px; }
        .success { color: #0f0; }
        .error { color: #f00; }
        .warning { color: #ff0; }
        #counter { font-size: 3em; margin: 10px; }
        #network { font-size: 0.9em; color: #aaa; }
        button { padding: 10px 20px; margin: 10px; background: #4285f4; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>🚌 Bus Tracker (REST API)</h1>
    <p>Identifiant : <strong id="busId">BUS_4</strong></p>
    <div id="counter">0</div>
    <div id="status">Initialisation...</div>
    <div id="network">Test de connexion...</div>
    <button id="testBtn">Tester la connexion</button>
    <p>Envoi toutes les 5 secondes</p>

    <script>
        const busId = "BUS_4"; // ou "BUS_8"
        const databaseURL = "https://bus-scolaire---iug-default-rtdb.europe-west1.firebasedatabase.app";
        let counter = 0;
        let lastPosition = null;

        const counterSpan = document.getElementById('counter');
        const statusDiv = document.getElementById('status');
        const networkDiv = document.getElementById('network');

        // Fonction pour tester la connexion (requête GET)
        async function testConnection() {
            networkDiv.innerHTML = 'Test de connexion...';
            try {
                const response = await fetch(`${databaseURL}/.json?shallow=true`);
                if (response.ok) {
                    networkDiv.innerHTML = '✅ Connexion réussie (REST)';
                    return true;
                } else {
                    networkDiv.innerHTML = `❌ Échec connexion: ${response.status}`;
                    return false;
                }
            } catch (error) {
                networkDiv.innerHTML = `❌ Erreur réseau: ${error.message}`;
                return false;
            }
        }

        // Envoi de la position via PUT
        async function sendPosition(lat, lng, speed) {
            const url = `${databaseURL}/bus_positions/${busId}.json`;
            const data = {
                lat: lat,
                lng: lng,
                speed: speed,
                timestamp: Date.now()
            };

            try {
                const response = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    counter++;
                    counterSpan.textContent = counter;
                    statusDiv.innerHTML = `<span class="success">✅ Envoyé #${counter}<br>Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}</span>`;
                } else {
                    const errorText = await response.text();
                    statusDiv.innerHTML = `<span class="error">❌ Erreur HTTP ${response.status}: ${errorText}</span>`;
                }
            } catch (error) {
                statusDiv.innerHTML = `<span class="error">❌ Erreur réseau: ${error.message}</span>`;
            }
        }

        // Fonction principale de géolocalisation et envoi
        function startTracking() {
            if (!navigator.geolocation) {
                statusDiv.innerHTML = '<span class="error">GPS non supporté</span>';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const speed = position.coords.speed || 0;
                    sendPosition(lat, lng, speed);
                },
                (error) => {
                    let msg = "Erreur GPS";
                    if (error.code === 1) msg = "Autorisation refusée";
                    else if (error.code === 2) msg = "Position indisponible";
                    else if (error.code === 3) msg = "Délai dépassé";
                    statusDiv.innerHTML = `<span class="error">${msg}</span>`;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // Lancer un test de connexion au chargement
        window.addEventListener('load', async () => {
            const connected = await testConnection();
            if (connected) {
                // Démarrer le tracking
                startTracking();
                setInterval(startTracking, 5000);
            } else {
                statusDiv.innerHTML = '<span class="error">Impossible de se connecter au serveur. Vérifiez votre connexion.</span>';
            }
        });

        // Bouton pour tester manuellement
        document.getElementById('testBtn').addEventListener('click', testConnection);
    </script>
</body>
</html>
