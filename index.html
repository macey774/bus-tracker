<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Bus</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; background: #111; color: #fff; }
        #status { margin: 20px; padding: 15px; background: #222; border-radius: 8px; }
        .success { color: #0f0; }
        .error { color: #f00; }
        #counter { font-size: 3em; margin: 10px; }
    </style>
</head>
<body>
    <h1>🚌 Bus Tracker</h1>
    <p>Identifiant : <strong id="busId">BUS_4</strong></p>
    <div id="counter">0</div>
    <div id="status">Initialisation...</div>
    <p>Envoi toutes les 5 secondes</p>

    <!-- Utilisation de Firebase 8.x (compatible avec l'API globale) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Configuration Firebase (identique à la vôtre)
        const firebaseConfig = {
            apiKey: "AIzaSyBcKo-baav4AZss0wibZFSPUonwOPeZEF8",
            authDomain: "bus-scolaire---iug.firebaseapp.com",
            databaseURL: "https://bus-scolaire---iug-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bus-scolaire---iug",
            storageBucket: "bus-scolaire---iug.firebasestorage.app",
            messagingSenderId: "527926199083",
            appId: "1:527926199083:web:c0f5057680762a33343b6e"
        };

        // Initialiser Firebase (maintenant firebase est défini globalement)
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const busId = "BUS_4"; // ou "BUS_8" selon le bus
        let counter = 0;
        const counterSpan = document.getElementById('counter');
        const statusDiv = document.getElementById('status');

        function sendPosition() {
            if (!navigator.geolocation) {
                statusDiv.innerHTML = '<span class="error">GPS non supporté</span>';
                return;
            }

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    const speed = position.coords.speed || 0;

                    // Référence Firebase
                    const ref = database.ref('bus_positions/' + busId);
                    ref.set({
                        lat: lat,
                        lng: lng,
                        speed: speed,
                        timestamp: Date.now()
                    }).then(() => {
                        counter++;
                        counterSpan.textContent = counter;
                        statusDiv.innerHTML = `<span class="success">✅ Envoyé #${counter}<br>Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}</span>`;
                    }).catch((error) => {
                        statusDiv.innerHTML = `<span class="error">❌ Firebase: ${error.message}</span>`;
                    });
                },
                (error) => {
                    let msg = "Erreur GPS";
                    if (error.code === 1) msg = "Autorisation refusée";
                    else if (error.code === 2) msg = "Position indisponible";
                    else if (error.code === 3) msg = "Délai dépassé";
                    statusDiv.innerHTML = `<span class="error">${msg}</span>`;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        }

        // Premier envoi immédiat, puis toutes les 5 secondes
        sendPosition();
        setInterval(sendPosition, 5000);
    </script>
</body>
</html>
