<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bus Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            background: #111;
            color: #fff;
        }
        h1 { color: #ffaa00; }
        #status {
            margin: 20px;
            padding: 15px;
            background: #222;
            border-radius: 10px;
            font-size: 16px;
        }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        #counter {
            font-size: 48px;
            margin: 20px;
            font-weight: bold;
            color: #4285f4;
        }
        .info { color: #aaa; font-size: 14px; }
    </style>
</head>
<body>
    <h1>🚌 Bus Tracker</h1>
    <p>Identifiant : <strong id="busId">BUS_4</strong></p>
    <div id="counter">0</div>
    <div id="status">Initialisation...</div>
    <div class="info">Envoi toutes les 5 secondes</div>

    <!-- Inclusion de Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js"></script>

    <script>
        // Configuration Firebase (remplacez par vos propres données)
        const firebaseConfig = {
            apiKey: "AIzaSyBcKo-baav4AZss0wibZFSPUonwOPeZEF8",
            authDomain: "bus-scolaire---iug.firebaseapp.com",
            databaseURL: "https://bus-scolaire---iug-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "bus-scolaire---iug",
            storageBucket: "bus-scolaire---iug.firebasestorage.app",
            messagingSenderId: "527926199083",
            appId: "1:527926199083:web:c0f5057680762a33343b6e"
        };

        // Initialiser Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Identifiant du bus (vous pouvez le changer ici)
        const busId = "BUS_4"; // ou "BUS_8"

        let counter = 0;
        const counterSpan = document.getElementById('counter');
        const statusDiv = document.getElementById('status');

        // Met à jour le compteur
        function incrementCounter() {
            counter++;
            counterSpan.textContent = counter;
        }

        // Envoie la position à Firebase
        function sendPosition(lat, lng, speed) {
            const ref = database.ref('bus_positions/' + busId);
            ref.set({
                lat: lat,
                lng: lng,
                speed: speed || 0,
                timestamp: Date.now()
            })
            .then(() => {
                statusDiv.innerHTML = `<span class="success">✅ Envoyé #${counter}<br>Lat: ${lat.toFixed(6)}<br>Lng: ${lng.toFixed(6)}</span>`;
            })
            .catch((error) => {
                statusDiv.innerHTML = `<span class="error">❌ Erreur Firebase : ${error.message}</span>`;
            });
        }

        // Fonction de tracking
        function startTracking() {
            if (!navigator.geolocation) {
                statusDiv.innerHTML = '<span class="error">GPS non supporté sur cet appareil</span>';
                return;
            }

            statusDiv.innerHTML = 'Recherche du signal GPS...';

            // Demander la position à intervalles réguliers (toutes les 5 secondes)
            setInterval(() => {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;
                        const speed = position.coords.speed; // peut être null
                        incrementCounter();
                        sendPosition(lat, lng, speed);
                    },
                    (error) => {
                        let msg = "Erreur GPS";
                        switch(error.code) {
                            case 1: msg = "Autorisation refusée"; break;
                            case 2: msg = "Position indisponible"; break;
                            case 3: msg = "Délai d'attente dépassé"; break;
                        }
                        statusDiv.innerHTML = `<span class="error">❌ ${msg}</span>`;
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            }, 5000); // 5000 ms = 5 secondes
        }

        // Démarrer le tracking automatiquement
        startTracking();
    </script>
</body>
</html>
